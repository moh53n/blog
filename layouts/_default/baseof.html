<!doctype html>
<html lang="{{ .Site.Language.Locale | default "en" }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {{- $description := .Description | default .Site.Params.description }}
    {{- $title := cond .IsHome .Site.Title (printf "%s | %s" .Title .Site.Title) }}
    <meta name="description" content="{{ $description }}" />
    <meta name="author" content="{{ .Site.Params.author }}" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="{{ .Permalink }}" />
    <link rel="author" href="https://moh53n.net/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="{{ .Site.Params.siteName }}" />
    <meta property="og:title" content="{{ $title }}" />
    <meta property="og:description" content="{{ $description }}" />
    <meta property="og:url" content="{{ .Permalink }}" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="{{ .Site.Params.twitterSite }}" />
    <meta name="twitter:creator" content="{{ .Site.Params.twitterCreator }}" />
    <meta name="twitter:title" content="{{ $title }}" />
    <meta name="twitter:description" content="{{ $description }}" />
    <title>{{ $title }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ "css/blog.css" | relURL }}" />
    {{ with .OutputFormats.Get "RSS" -}}
      <link
        rel="alternate"
        type="application/rss+xml"
        title="{{ $.Site.Title }} RSS"
        href="{{ .RelPermalink }}"
      />
    {{- end }}
  </head>
  <body>
    <header class="site-header">
      <a class="site-header__brand" href="/">Mohsen Tahmasebi</a>
      <nav class="site-header__nav" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="/portfolio/">Portfolio</a>
        <a aria-current="page" href="/blog/">Blog</a>
        <a href="/blog-fa/">Persian Blog</a>
        <a href="mailto:moh53n@moh53n.net">Email</a>
      </nav>
    </header>

    <main class="portfolio-page">
      {{ block "main" . }}{{ end }}

      <footer class="portfolio-section" aria-label="Subscribe and contact links">
        <div class="contact-band">
          <form class="subscribe-form" aria-label="Subscribe by email">
            <label class="subscribe-form__label" for="subscribe-email">
              Email address
            </label>
            <input
              id="subscribe-email"
              name="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
            <button type="submit">Subscribe</button>
          </form>
          <nav class="contact-social" aria-label="Contact and social links">
            <a
              href="https://www.linkedin.com/in/mohsen-tahmasebi/"
              rel="me"
              aria-label="LinkedIn"
              title="LinkedIn"
            >
              <img src="{{ "assets/icons/linkedin.svg" | relURL }}" alt="" aria-hidden="true" />
            </a>
            <a
              href="https://github.com/moh53n"
              rel="me"
              aria-label="GitHub"
              title="GitHub"
            >
              <img src="{{ "assets/icons/github.svg" | relURL }}" alt="" aria-hidden="true" />
            </a>
            <a
              href="https://twitter.com/moh53n"
              rel="me"
              aria-label="English Twitter"
              title="English Twitter"
            >
              <img src="{{ "assets/icons/twitter.svg" | relURL }}" alt="" aria-hidden="true" />
            </a>
            <a
              href="https://bsky.app/profile/moh53n.bsky.social"
              rel="me"
              aria-label="Bluesky"
              title="bluesky"
            >
              <img src="{{ "assets/icons/Bluesky.svg" | relURL }}" alt="" aria-hidden="true" />
            </a>
            <a
              href="https://www.reddit.com/user/moh53n/"
              rel="me"
              aria-label="Reddit"
              title="Reddit"
            >
              <img src="{{ "assets/icons/reddit.svg" | relURL }}" alt="" aria-hidden="true" />
            </a>
            <a
              href="https://moh53n.medium.com/"
              rel="me"
              aria-label="Medium Blog"
              title="Medium Blog"
            >
              <img src="{{ "assets/icons/medium.svg" | relURL }}" alt="" aria-hidden="true" />
            </a>
            <a
              href="mailto:moh53n@moh53n.net"
              aria-label="Email"
              title="Email"
            >
              <img src="{{ "assets/icons/envelope.svg" | relURL }}" alt="" aria-hidden="true" />
            </a>
          </nav>
        </div>
      </footer>
    </main>
  </body>
</html>
